<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Rose Bouquet | 玫瑰花束</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a14;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: pan-x pan-y pinch-zoom;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        #container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            height: 100dvh;
        }

        canvas { display: block; }

        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #8899aa;
            font-size: 16px;
            z-index: 10;
            transition: opacity 0.6s;
            pointer-events: none;
        }
        #loading.hidden { opacity: 0; }

        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.35);
            font-size: 12px;
            z-index: 5;
            pointer-events: none;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            #info { font-size: 10px; bottom: 12px; }
        }
    </style>
</head>
<body>
    <div id="loading">🌹 正在生成玫瑰花束...</div>
    <div id="container"></div>
    <div id="info">拖拽旋转 · 滚轮缩放 · 双指操作</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ==================== 场景初始化 ====================
    const container = document.getElementById('container');
    const scene = new THREE.Scene();

    // 背景渐变 — 使用场景背景色
    scene.background = new THREE.Color('#0a0a18');
    scene.fog = new THREE.Fog('#0a0a18', 3, 10);

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 20);
    camera.position.set(1.8, 0.6, 2.4);
    camera.lookAt(0, -0.35, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    // OrbitControls — 支持触摸
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, -0.35, -0.1);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.4;
    controls.minDistance = 1.2;
    controls.maxDistance = 6;
    controls.maxPolarAngle = Math.PI * 0.7;
    controls.minPolarAngle = 0.2;
    controls.update();

    // ==================== 光照 ====================
    // 环境光 — 基础照明
    const ambientLight = new THREE.AmbientLight('#4466aa', 1.8);
    scene.add(ambientLight);

    // 半球光 — 天空和地面
    const hemiLight = new THREE.HemisphereLight('#8899cc', '#223344', 0.8);
    scene.add(hemiLight);

    // 主方向光 — 产生立体感和阴影
    const keyLight = new THREE.DirectionalLight('#ffffff', 3.5);
    keyLight.position.set(3, 4, 5);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 1024;
    keyLight.shadow.mapSize.height = 1024;
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far = 20;
    keyLight.shadow.camera.left = -5;
    keyLight.shadow.camera.right = 5;
    keyLight.shadow.camera.top = 5;
    keyLight.shadow.camera.bottom = -5;
    keyLight.shadow.bias = -0.0001;
    scene.add(keyLight);

    // 补光 — 减少暗部过黑
    const fillLight = new THREE.DirectionalLight('#8899cc', 1.5);
    fillLight.position.set(-2, 1, -2);
    scene.add(fillLight);

    // 底部补光 — 让花束底部不显得太暗
    const rimLight = new THREE.DirectionalLight('#446688', 1.2);
    rimLight.position.set(0, -1, 1);
    scene.add(rimLight);

    // ==================== 数学工具函数 ====================
    function mod(a, b) {
        return a - Math.floor(a / b) * b;
    }

    // 色彩映射 — 线性插值
    const cL = [
        [0.02, 0.04, 0.39],
        [0.02, 0.06, 0.69],
        [0.01, 0.26, 0.99],
        [0.17, 0.69, 1.0]
    ];
    const cLbud = cL.map(c => [c[0] * 0.4 + 0.6, c[1] * 0.4 + 0.6, c[2] * 0.4 + 0.6]);

    function colorMap(value, colors) {
        const n = colors.length - 1;
        const idx = Math.max(0, Math.min(n, value * n));
        const i = Math.min(Math.floor(idx), n - 1);
        const t = idx - i;
        const c0 = colors[i], c1 = colors[i + 1];
        return [
            c0[0] + (c1[0] - c0[0]) * t,
            c0[1] + (c1[1] - c0[1]) * t,
            c0[2] + (c1[2] - c0[2]) * t
        ];
    }

    // 旋转矩阵: Euler XYZ 内旋 (与 scipy from_euler('xyz', degrees=True) 一致)
    // R = Rx(ax) * Ry(ay) * Rz(az)
    function createRotationMatrix(ax, ay, az) {
        const cx = Math.cos(ax), sx = Math.sin(ax);
        const cy = Math.cos(ay), sy = Math.sin(ay);
        const cz = Math.cos(az), sz = Math.sin(az);

        return [
            cy * cz,
            -cy * sz,
            sy,
            cx * sz + sx * sy * cz,
            cx * cz - sx * sy * sz,
            -sx * cy,
            sx * sz - cx * sy * cz,
            sx * cz + cx * sy * sz,
            cx * cy
        ];
    }

    function rotatePoints(X, Y, Z, anglesDeg) {
        const ax = anglesDeg[0] * Math.PI / 180;
        const ay = anglesDeg[1] * Math.PI / 180;
        const az = anglesDeg[2] * Math.PI / 180;
        const m = createRotationMatrix(ax, ay, az);

        const n = X.length;
        const X2 = new Float32Array(n);
        const Y2 = new Float32Array(n);
        const Z2 = new Float32Array(n);
        for (let i = 0; i < n; i++) {
            X2[i] = m[0] * X[i] + m[1] * Y[i] + m[2] * Z[i];
            Y2[i] = m[3] * X[i] + m[4] * Y[i] + m[5] * Z[i];
            Z2[i] = m[6] * X[i] + m[7] * Y[i] + m[8] * Z[i];
        }
        return [X2, Y2, Z2];
    }

    // ==================== 花朵表面生成 ====================
    const FLOWER_ANGULAR_STEP = 4;   // 原 1151 点的步长
    const FLOWER_RADIAL_COUNT = 25;  // 保持原始分辨率
    const BUD_ANGULAR_STEP = 2;      // 原 151 点的步长
    const BUD_RADIAL_STEP = 2;       // 原 101 点的步长

    function generateFlowerGrid() {
        // t1: 25 点, 0 到 1
        const t1 = new Float32Array(FLOWER_RADIAL_COUNT);
        for (let i = 0; i < FLOWER_RADIAL_COUNT; i++) {
            t1[i] = i / (FLOWER_RADIAL_COUNT - 1);
        }

        // t2: 从原 1151 点中取样
        const origAngularCount = 1151;
        const nAngular = Math.floor((origAngularCount - 1) / FLOWER_ANGULAR_STEP) + 1;
        const t2 = new Float32Array(nAngular);
        for (let i = 0; i < nAngular; i++) {
            const origI = i * FLOWER_ANGULAR_STEP;
            t2[i] = origI * 0.5 / 575 * 20 * Math.PI + 4 * Math.PI;
        }

        const nTotal = nAngular * FLOWER_RADIAL_COUNT;
        const posX = new Float32Array(nTotal);
        const posY = new Float32Array(nTotal);
        const posZ = new Float32Array(nTotal);
        const heights = new Float32Array(nTotal);
        let minH = Infinity, maxH = -Infinity;

        for (let i = 0; i < nAngular; i++) {
            const t = t2[i];
            const cosT = Math.cos(t);
            const sinT = Math.sin(t);
            const expTerm = Math.exp(-t / (8 * Math.PI));
            const p = (Math.PI / 2) * expTerm;
            const modTerm = mod(3.6 * t, 2 * Math.PI) / Math.PI;
            const u = 1 - Math.pow(1 - modTerm, 4) / 2 + Math.sin(15 * t) / 150 + Math.sin(15 * t) / 150;
            const sinP = Math.sin(p);
            const cosP = Math.cos(p);

            for (let j = 0; j < FLOWER_RADIAL_COUNT; j++) {
                const x = t1[j];
                const y = 2 * Math.pow(x * x - x, 2) * sinP;
                const r = u * (x * sinP + y * cosP);
                const h = u * (x * cosP - y * sinP);

                const idx = i * FLOWER_RADIAL_COUNT + j;
                posX[idx] = r * cosT;
                posY[idx] = r * sinT;
                posZ[idx] = h + 0.35;
                heights[idx] = h;

                if (h < minH) minH = h;
                if (h > maxH) maxH = h;
            }
        }

        return {
            posX, posY, posZ, heights,
            nAngular, nRadial: FLOWER_RADIAL_COUNT,
            minH, maxH
        };
    }

    function buildSurfaceGeometry(posX, posY, posZ, heights, minH, maxH, colormapColors, nAngular, nRadial) {
        const nTotal = nAngular * nRadial;
        const positions = new Float32Array(nTotal * 3);
        const colors = new Float32Array(nTotal * 3);

        const hRange = maxH - minH || 1;

        for (let i = 0; i < nTotal; i++) {
            positions[i * 3] = posX[i];
            positions[i * 3 + 1] = posY[i];
            positions[i * 3 + 2] = posZ[i];

            const normH = (heights[i] - minH) / hRange;
            const [r, g, b] = colorMap(normH, colormapColors);
            colors[i * 3] = r;
            colors[i * 3 + 1] = g;
            colors[i * 3 + 2] = b;
        }

        // 构建索引 (三角形)
        const indices = [];
        for (let i = 0; i < nAngular - 1; i++) {
            for (let j = 0; j < nRadial - 1; j++) {
                const a = i * nRadial + j;
                const b = a + nRadial;
                const c = a + 1;
                const d = b + 1;
                indices.push(a, b, c);
                indices.push(b, d, c);
            }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();

        return geometry;
    }

    function findMinZPoint(posX, posY, posZ) {
        let minZ = Infinity, minIdx = 0;
        for (let i = 0; i < posZ.length; i++) {
            if (posZ[i] < minZ) {
                minZ = posZ[i];
                minIdx = i;
            }
        }
        return { x: posX[minIdx], y: posY[minIdx], z: posZ[minIdx] };
    }

    // ==================== 花蕾 (Bud) 生成 ====================
    function generateBudGrid() {
        // tb: 原 151 点, linspace(0, 2, 151)
        const origTbCount = 151;
        const nTb = Math.floor((origTbCount - 1) / BUD_ANGULAR_STEP) + 1;
        const tb = new Float32Array(nTb);
        for (let i = 0; i < nTb; i++) {
            tb[i] = (i * BUD_ANGULAR_STEP) / (origTbCount - 1) * 2;
        }

        // rb: 原 101 点
        const origRbCount = 101;
        const nRb = Math.floor((origRbCount - 1) / BUD_RADIAL_STEP) + 1;
        const rbLin = new Float32Array(nRb);
        for (let i = 0; i < nRb; i++) {
            rbLin[i] = (i * BUD_RADIAL_STEP) / (origRbCount - 1);
        }

        // 预计算 rb 矩阵: (nRb, nTb) — rb[i][j] = rbLin[i] * ((abs(1-mod(tb[j]*5,2)))/2 + .3) / 2.5
        const nTotal = nRb * nTb;
        const posX = new Float32Array(nTotal);
        const posY = new Float32Array(nTotal);
        const posZ = new Float32Array(nTotal);
        const heights = new Float32Array(nTotal);
        let minH = Infinity, maxH = -Infinity;

        for (let i = 0; i < nRb; i++) {
            const rLin = rbLin[i];
            for (let j = 0; j < nTb; j++) {
                const tbVal = tb[j];
                const factor = ((Math.abs(1 - mod(tbVal * 5, 2))) / 2 + 0.3) / 2.5;
                const rbVal = rLin * factor;
                const angle = tbVal * Math.PI;

                const x = rbVal * Math.cos(angle);
                const y = rbVal * Math.sin(angle);
                const h = Math.pow(-Math.cos(rbVal * 1.2 * Math.PI) + 1, 0.2);

                const idx = i * nTb + j;
                posX[idx] = x;
                posY[idx] = y;
                posZ[idx] = h / 2.5 + 0.32;
                heights[idx] = h;

                if (h < minH) minH = h;
                if (h > maxH) maxH = h;
            }
        }

        return {
            posX, posY, posZ, heights,
            nU: nRb, nV: nTb,
            minH, maxH
        };
    }

    // ==================== 花茎 (Stem) 生成 ====================
    function createStemGeometry(startPoint) {
        const x1 = startPoint.x;
        const y1 = startPoint.y;
        const z1 = startPoint.z + 0.03;

        const cos60 = Math.cos(Math.PI / 3);
        const sin60 = Math.sin(Math.PI / 3);

        const cp0 = new THREE.Vector3(x1, y1, z1);
        const cp1 = new THREE.Vector3(0, 0, -0.7);
        const cp2 = new THREE.Vector3(
            (x1 * cos60 - y1 * sin60) / 3,
            (y1 * cos60 + x1 * sin60) / 3,
            -1.5
        );

        const curve = new THREE.QuadraticBezierCurve3(cp0, cp1, cp2);
        const tubeGeometry = new THREE.TubeGeometry(curve, 48, 0.012, 8, false);

        return tubeGeometry;
    }

    // ==================== 组装场景 ====================
    const flowerMaterial = new THREE.MeshPhongMaterial({
        vertexColors: true,
        specular: '#222244',
        shininess: 15,
        side: THREE.DoubleSide,
        flatShading: false,
    });

    const budMaterial = new THREE.MeshPhongMaterial({
        vertexColors: true,
        specular: '#222233',
        shininess: 10,
        side: THREE.DoubleSide,
        flatShading: false,
    });

    const stemMaterial = new THREE.MeshStandardMaterial({
        color: '#58827E',
        roughness: 0.55,
        metalness: 0.05,
    });

    const bouquetGroup = new THREE.Group();
    scene.add(bouquetGroup);

    // --- 生成主花朵 ---
    console.time('Generate flowers');
    const flowerGrid = generateFlowerGrid();

    // 初始倾斜 [180/8, 0, 0] = [22.5°, 0, 0]
    let [fX, fY, fZ] = rotatePoints(flowerGrid.posX, flowerGrid.posY, flowerGrid.posZ, [180 / 8, 0, 0]);
    // Y 轴下移 0.4
    for (let i = 0; i < fY.length; i++) fY[i] -= 0.4;

    // 5 个旋转副本
    for (let k = 0; k < 5; k++) {
        const angle = (k + 1) * 72; // 72°, 144°, 216°, 288°, 360°(=0°)
        const [rX, rY, rZ] = rotatePoints(fX, fY, fZ, [0, 0, angle]);

        // Z 轴下移 0.1
        const finalZ = new Float32Array(rZ.length);
        for (let i = 0; i < rZ.length; i++) finalZ[i] = rZ[i] - 0.1;

        const geometry = buildSurfaceGeometry(
            rX, rY, finalZ,
            flowerGrid.heights, flowerGrid.minH, flowerGrid.maxH,
            cL, flowerGrid.nAngular, flowerGrid.nRadial
        );

        const mesh = new THREE.Mesh(geometry, flowerMaterial);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        bouquetGroup.add(mesh);

        // 花茎
        const minPt = findMinZPoint(rX, rY, finalZ);
        const stemGeo = createStemGeometry(minPt);
        const stemMesh = new THREE.Mesh(stemGeo, stemMaterial);
        stemMesh.castShadow = true;
        stemMesh.receiveShadow = true;
        bouquetGroup.add(stemMesh);
    }
    console.timeEnd('Generate flowers');

    // --- 生成花蕾 ---
    console.time('Generate buds');
    const budGrid = generateBudGrid();

    // 初始倾斜 [180/9, 0, 0] = [20°, 0, 0]
    let [bX, bY, bZ] = rotatePoints(budGrid.posX, budGrid.posY, budGrid.posZ, [180 / 9, 0, 0]);
    // Y 轴下移 1.35
    for (let i = 0; i < bY.length; i++) bY[i] -= 1.35;

    // 4 种花蕾变体: bud1 (offset 0), bud2 (offset 36), bud3 (offset 24), bud4 (offset 48)
    // Python: u2=rT(u1,36), u3=rT(u1,24), u4=rT(u3,24) → 绝对偏移量
    const budOffsets = [0, 36, 24, 48];

    // 每种花蕾变体, 生成 5 个旋转副本 (k=0..4, 对应第 1..5 次循环)
    // Python for i in range(5): 先 rotate 72°, 再 plot
    // → 每个副本的绝对角度 = offset + (k+1)*72°
    for (let v = 0; v < 4; v++) {
        const offset = budOffsets[v];
        for (let k = 0; k < 5; k++) {
            const angle = offset + (k + 1) * 72;
            const [finalX, finalY, finalZ] = rotatePoints(bX, bY, bZ, [0, 0, angle]);

            const geometry = buildSurfaceGeometry(
                finalX, finalY, finalZ,
                budGrid.heights, budGrid.minH, budGrid.maxH,
                cLbud, budGrid.nU, budGrid.nV
            );

            const mesh = new THREE.Mesh(geometry, budMaterial);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            bouquetGroup.add(mesh);

            // 花蕾茎
            const minPt = findMinZPoint(finalX, finalY, finalZ);
            const stemGeo = createStemGeometry(minPt);
            const stemMesh = new THREE.Mesh(stemGeo, stemMaterial);
            stemMesh.castShadow = true;
            stemMesh.receiveShadow = true;
            bouquetGroup.add(stemMesh);
        }
    }
    console.timeEnd('Generate buds');

    // ==================== 装饰粒子 (光点) ====================
    const particlesGeo = new THREE.BufferGeometry();
    const particlesCount = 300;
    const particlesPos = new Float32Array(particlesCount * 3);
    for (let i = 0; i < particlesCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI * 0.6;
        const r = 1.5 + Math.random() * 2.5;
        particlesPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        particlesPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        particlesPos[i * 3 + 2] = r * Math.cos(phi) - 0.4;
    }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlesPos, 3));
    const particlesMat = new THREE.PointsMaterial({
        color: '#8899cc',
        size: 0.015,
        transparent: true,
        opacity: 0.5,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
    });
    const particles = new THREE.Points(particlesGeo, particlesMat);
    bouquetGroup.add(particles);

    // ==================== 隐藏加载提示 ====================
    document.getElementById('loading').classList.add('hidden');
    setTimeout(() => {
        const el = document.getElementById('loading');
        if (el) el.remove();
    }, 700);

    // ==================== 响应式处理 ====================
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // ==================== 渲染循环 ====================
    let firstFrame = true;
    function animate() {
        requestAnimationFrame(animate);
        controls.update();

        // 粒子微微浮动
        particles.rotation.y += 0.0003;
        particles.rotation.x += 0.0001;

        renderer.render(scene, camera);

        if (firstFrame) {
            firstFrame = false;
            const tri = renderer.info.render.triangles;
            console.log(`🌹 玫瑰花束已就绪 — ${bouquetGroup.children.length} 个几何体, ~${Math.round(tri / 1000)}k 三角形`);
            console.log(`  拖拽旋转 · 滚轮缩放 · 双指操作`);
        }
    }
    animate();
    </script>
</body>
</html>
