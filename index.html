<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rose Bouquet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000000;
            overflow: hidden;
            touch-action: pan-x pan-y pinch-zoom;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        #container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            height: 100dvh;
        }
        canvas { display: block; }

        #greeting {
            position: fixed;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(20px, 4vw, 36px);
            color: #e8b4b8;
            letter-spacing: 2px;
            z-index: 5;
            pointer-events: none;
            text-align: center;
            text-shadow: 0 0 20px rgba(200, 120, 130, 0.3), 0 0 40px rgba(200, 120, 130, 0.15);
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="greeting">毕业快乐呀，小太阳！</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ==================== 场景 ====================
    const container = document.getElementById('container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#000000');
    scene.fog = new THREE.Fog('#000000', 4, 12);

    const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 20);
    camera.position.set(0, 0.8, 3.8);
    camera.lookAt(0, -0.05, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, -0.05, 0.1);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.minDistance = 1.5;
    controls.maxDistance = 8;
    controls.maxPolarAngle = Math.PI * 0.6;
    controls.minPolarAngle = 0.1;
    controls.update();

    // ==================== 光照 ====================
    const ambientLight = new THREE.AmbientLight('#fff5f0', 2.2);
    scene.add(ambientLight);

    const hemiLight = new THREE.HemisphereLight('#fff0f5', '#3d2833', 1.0);
    scene.add(hemiLight);

    const keyLight = new THREE.DirectionalLight('#ffffff', 3.0);
    keyLight.position.set(4, 5, 4);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 1024;
    keyLight.shadow.mapSize.height = 1024;
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far = 20;
    keyLight.shadow.camera.left = -5;
    keyLight.shadow.camera.right = 5;
    keyLight.shadow.camera.top = 5;
    keyLight.shadow.camera.bottom = -5;
    keyLight.shadow.bias = -0.0001;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight('#ffd5cc', 1.2);
    fillLight.position.set(-2, 1, -2);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight('#cc8899', 1.0);
    rimLight.position.set(0, -1, 1);
    scene.add(rimLight);

    // ==================== 数学工具 ====================
    function mod(a, b) {
        return a - Math.floor(a / b) * b;
    }

    // 温柔粉色系渐变 (从浅粉到深玫瑰)
    const cL = [
        [0.98, 0.78, 0.80],  // 浅粉
        [0.95, 0.62, 0.68],  // 柔和粉
        [0.88, 0.42, 0.52],  // 玫瑰粉
        [0.72, 0.25, 0.38],  // 深玫瑰
    ];
    const cLbud = cL.map(c => [c[0] * 0.5 + 0.5, c[1] * 0.5 + 0.5, c[2] * 0.5 + 0.5]);

    function colorMap(value, colors) {
        const n = colors.length - 1;
        const idx = Math.max(0, Math.min(n, value * n));
        const i = Math.min(Math.floor(idx), n - 1);
        const t = idx - i;
        const c0 = colors[i], c1 = colors[i + 1];
        return [
            c0[0] + (c1[0] - c0[0]) * t,
            c0[1] + (c1[1] - c0[1]) * t,
            c0[2] + (c1[2] - c0[2]) * t
        ];
    }

    function createRotationMatrix(ax, ay, az) {
        const cx = Math.cos(ax), sx = Math.sin(ax);
        const cy = Math.cos(ay), sy = Math.sin(ay);
        const cz = Math.cos(az), sz = Math.sin(az);
        return [
            cy * cz,
            -cy * sz,
            sy,
            cx * sz + sx * sy * cz,
            cx * cz - sx * sy * sz,
            -sx * cy,
            sx * sz - cx * sy * cz,
            sx * cz + cx * sy * sz,
            cx * cy
        ];
    }

    function rotatePoints(X, Y, Z, anglesDeg) {
        const ax = anglesDeg[0] * Math.PI / 180;
        const ay = anglesDeg[1] * Math.PI / 180;
        const az = anglesDeg[2] * Math.PI / 180;
        const m = createRotationMatrix(ax, ay, az);
        const n = X.length;
        const X2 = new Float32Array(n);
        const Y2 = new Float32Array(n);
        const Z2 = new Float32Array(n);
        for (let i = 0; i < n; i++) {
            X2[i] = m[0] * X[i] + m[1] * Y[i] + m[2] * Z[i];
            Y2[i] = m[3] * X[i] + m[4] * Y[i] + m[5] * Z[i];
            Z2[i] = m[6] * X[i] + m[7] * Y[i] + m[8] * Z[i];
        }
        return [X2, Y2, Z2];
    }

    // ==================== 花朵表面 ====================
    const FLOWER_ANGULAR_STEP = 4;
    const FLOWER_RADIAL_COUNT = 25;
    const BUD_ANGULAR_STEP = 2;
    const BUD_RADIAL_STEP = 2;

    function generateFlowerGrid() {
        const t1 = new Float32Array(FLOWER_RADIAL_COUNT);
        for (let i = 0; i < FLOWER_RADIAL_COUNT; i++) {
            t1[i] = i / (FLOWER_RADIAL_COUNT - 1);
        }
        const origAngularCount = 1151;
        const nAngular = Math.floor((origAngularCount - 1) / FLOWER_ANGULAR_STEP) + 1;
        const t2 = new Float32Array(nAngular);
        for (let i = 0; i < nAngular; i++) {
            const origI = i * FLOWER_ANGULAR_STEP;
            t2[i] = origI * 0.5 / 575 * 20 * Math.PI + 4 * Math.PI;
        }
        const nTotal = nAngular * FLOWER_RADIAL_COUNT;
        const posX = new Float32Array(nTotal);
        const posY = new Float32Array(nTotal);
        const posZ = new Float32Array(nTotal);
        const heights = new Float32Array(nTotal);
        let minH = Infinity, maxH = -Infinity;

        for (let i = 0; i < nAngular; i++) {
            const t = t2[i];
            const cosT = Math.cos(t);
            const sinT = Math.sin(t);
            const p = (Math.PI / 2) * Math.exp(-t / (8 * Math.PI));
            const modTerm = mod(3.6 * t, 2 * Math.PI) / Math.PI;
            const u = 1 - Math.pow(1 - modTerm, 4) / 2 + Math.sin(15 * t) / 150 + Math.sin(15 * t) / 150;
            const sinP = Math.sin(p);
            const cosP = Math.cos(p);

            for (let j = 0; j < FLOWER_RADIAL_COUNT; j++) {
                const x = t1[j];
                const y = 2 * Math.pow(x * x - x, 2) * sinP;
                const r = u * (x * sinP + y * cosP);
                const h = u * (x * cosP - y * sinP);
                const idx = i * FLOWER_RADIAL_COUNT + j;
                posX[idx] = r * cosT;
                posY[idx] = r * sinT;
                posZ[idx] = h + 0.35;
                heights[idx] = h;
                if (h < minH) minH = h;
                if (h > maxH) maxH = h;
            }
        }
        return { posX, posY, posZ, heights, nAngular, nRadial: FLOWER_RADIAL_COUNT, minH, maxH };
    }

    function buildSurfaceGeometry(posX, posY, posZ, heights, minH, maxH, colormapColors, nAngular, nRadial) {
        const nTotal = nAngular * nRadial;
        const positions = new Float32Array(nTotal * 3);
        const colors = new Float32Array(nTotal * 3);
        const hRange = maxH - minH || 1;
        for (let i = 0; i < nTotal; i++) {
            positions[i * 3] = posX[i];
            positions[i * 3 + 1] = posY[i];
            positions[i * 3 + 2] = posZ[i];
            const normH = (heights[i] - minH) / hRange;
            const [r, g, b] = colorMap(normH, colormapColors);
            colors[i * 3] = r;
            colors[i * 3 + 1] = g;
            colors[i * 3 + 2] = b;
        }
        const indices = [];
        for (let i = 0; i < nAngular - 1; i++) {
            for (let j = 0; j < nRadial - 1; j++) {
                const a = i * nRadial + j;
                const b = a + nRadial;
                const c = a + 1;
                const d = b + 1;
                indices.push(a, b, c);
                indices.push(b, d, c);
            }
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();
        return geometry;
    }

    function findMinZPoint(posX, posY, posZ) {
        let minZ = Infinity, minIdx = 0;
        for (let i = 0; i < posZ.length; i++) {
            if (posZ[i] < minZ) { minZ = posZ[i]; minIdx = i; }
        }
        return { x: posX[minIdx], y: posY[minIdx], z: posZ[minIdx] };
    }

    // ==================== 花蕾 ====================
    function generateBudGrid() {
        const origTbCount = 151;
        const nTb = Math.floor((origTbCount - 1) / BUD_ANGULAR_STEP) + 1;
        const tb = new Float32Array(nTb);
        for (let i = 0; i < nTb; i++) {
            tb[i] = (i * BUD_ANGULAR_STEP) / (origTbCount - 1) * 2;
        }
        const origRbCount = 101;
        const nRb = Math.floor((origRbCount - 1) / BUD_RADIAL_STEP) + 1;
        const rbLin = new Float32Array(nRb);
        for (let i = 0; i < nRb; i++) {
            rbLin[i] = (i * BUD_RADIAL_STEP) / (origRbCount - 1);
        }
        const nTotal = nRb * nTb;
        const posX = new Float32Array(nTotal);
        const posY = new Float32Array(nTotal);
        const posZ = new Float32Array(nTotal);
        const heights = new Float32Array(nTotal);
        let minH = Infinity, maxH = -Infinity;
        for (let i = 0; i < nRb; i++) {
            const rLin = rbLin[i];
            for (let j = 0; j < nTb; j++) {
                const tbVal = tb[j];
                const factor = ((Math.abs(1 - mod(tbVal * 5, 2))) / 2 + 0.3) / 2.5;
                const rbVal = rLin * factor;
                const x = rbVal * Math.cos(tbVal * Math.PI);
                const y = rbVal * Math.sin(tbVal * Math.PI);
                const h = Math.pow(-Math.cos(rbVal * 1.2 * Math.PI) + 1, 0.2);
                const idx = i * nTb + j;
                posX[idx] = x;
                posY[idx] = y;
                posZ[idx] = h / 2.5 + 0.32;
                heights[idx] = h;
                if (h < minH) minH = h;
                if (h > maxH) maxH = h;
            }
        }
        return { posX, posY, posZ, heights, nU: nRb, nV: nTb, minH, maxH };
    }

    // ==================== 花茎 ====================
    function createStemGeometry(startPoint) {
        const x1 = startPoint.x;
        const y1 = startPoint.y;
        const z1 = startPoint.z + 0.03;
        const cos60 = Math.cos(Math.PI / 3);
        const sin60 = Math.sin(Math.PI / 3);
        const cp0 = new THREE.Vector3(x1, y1, z1);
        const cp1 = new THREE.Vector3(0, 0, -0.7);
        const cp2 = new THREE.Vector3(
            (x1 * cos60 - y1 * sin60) / 3,
            (y1 * cos60 + x1 * sin60) / 3,
            -1.5
        );
        const curve = new THREE.QuadraticBezierCurve3(cp0, cp1, cp2);
        return new THREE.TubeGeometry(curve, 48, 0.012, 8, false);
    }

    // ==================== 材质 ====================
    const flowerMaterial = new THREE.MeshPhongMaterial({
        vertexColors: true,
        specular: '#332222',
        shininess: 12,
        side: THREE.DoubleSide,
        flatShading: false,
    });

    const budMaterial = new THREE.MeshPhongMaterial({
        vertexColors: true,
        specular: '#332222',
        shininess: 8,
        side: THREE.DoubleSide,
        flatShading: false,
    });

    const stemMaterial = new THREE.MeshStandardMaterial({
        color: '#7a9e8a',
        roughness: 0.5,
        metalness: 0.05,
    });

    // ==================== 组装 ====================
    const bouquetGroup = new THREE.Group();
    bouquetGroup.scale.set(0.35, 0.35, 0.35);
    scene.add(bouquetGroup);

    // --- 主花朵 ---
    const flowerGrid = generateFlowerGrid();

    // 初始倾斜 X 轴 22.5°
    let [fX, fY, fZ] = rotatePoints(flowerGrid.posX, flowerGrid.posY, flowerGrid.posZ, [180 / 8, 0, 0]);
    for (let i = 0; i < fY.length; i++) fY[i] -= 0.4;

    for (let k = 0; k < 5; k++) {
        const angle = (k + 1) * 72;
        const [rX, rY, rZ] = rotatePoints(fX, fY, fZ, [0, 0, angle]);
        const finalZ = new Float32Array(rZ.length);
        for (let i = 0; i < rZ.length; i++) finalZ[i] = rZ[i] - 0.1;

        const geometry = buildSurfaceGeometry(rX, rY, finalZ, flowerGrid.heights, flowerGrid.minH, flowerGrid.maxH, cL, flowerGrid.nAngular, flowerGrid.nRadial);
        const mesh = new THREE.Mesh(geometry, flowerMaterial);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        bouquetGroup.add(mesh);

        const minPt = findMinZPoint(rX, rY, finalZ);
        const stemGeo = createStemGeometry(minPt);
        const stemMesh = new THREE.Mesh(stemGeo, stemMaterial);
        stemMesh.castShadow = true;
        stemMesh.receiveShadow = true;
        bouquetGroup.add(stemMesh);
    }

    // --- 花蕾 ---
    const budGrid = generateBudGrid();
    let [bX, bY, bZ] = rotatePoints(budGrid.posX, budGrid.posY, budGrid.posZ, [180 / 9, 0, 0]);
    for (let i = 0; i < bY.length; i++) bY[i] -= 1.35;

    const budOffsets = [0, 36, 24, 48];
    for (let v = 0; v < 4; v++) {
        const offset = budOffsets[v];
        for (let k = 0; k < 5; k++) {
            const angle = offset + (k + 1) * 72;
            const [finalX, finalY, finalZ] = rotatePoints(bX, bY, bZ, [0, 0, angle]);
            const geometry = buildSurfaceGeometry(finalX, finalY, finalZ, budGrid.heights, budGrid.minH, budGrid.maxH, cLbud, budGrid.nU, budGrid.nV);
            const mesh = new THREE.Mesh(geometry, budMaterial);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            bouquetGroup.add(mesh);

            const minPt = findMinZPoint(finalX, finalY, finalZ);
            const stemGeo = createStemGeometry(minPt);
            const stemMesh = new THREE.Mesh(stemGeo, stemMaterial);
            stemMesh.castShadow = true;
            stemMesh.receiveShadow = true;
            bouquetGroup.add(stemMesh);
        }
    }

    // ==================== 粒子 ====================
    const particlesGeo = new THREE.BufferGeometry();
    const particlesCount = 200;
    const particlesPos = new Float32Array(particlesCount * 3);
    for (let i = 0; i < particlesCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI * 0.6;
        const r = 2.0 + Math.random() * 3.5;
        particlesPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        particlesPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        particlesPos[i * 3 + 2] = r * Math.cos(phi) - 0.4;
    }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlesPos, 3));
    const particlesMat = new THREE.PointsMaterial({
        color: '#ffccd5',
        size: 0.02,
        transparent: true,
        opacity: 0.45,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
    });
    const particles = new THREE.Points(particlesGeo, particlesMat);
    bouquetGroup.add(particles);

    // ==================== 响应式 ====================
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // ==================== 渲染循环 ====================
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        particles.rotation.y += 0.0003;
        particles.rotation.x += 0.0001;
        renderer.render(scene, camera);
    }
    animate();
    </script>
</body>
</html>
